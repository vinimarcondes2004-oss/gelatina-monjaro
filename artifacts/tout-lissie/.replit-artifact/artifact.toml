kind = "web"
previewPath = "/"
title = "Tout Lissie - Página de Vendas"
version = "1.0.0"
id = "artifacts/tout-lissie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19571
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/tout-lissie run dev"

[services.env]
PORT = "19571"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/tout-lissie", "run", "build"]
publicDir = "artifacts/tout-lissie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
